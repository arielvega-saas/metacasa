name: MetaCasa
options:
  bundleIdPrefix: com.metacasa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"
  groupSortPosition: top
  developmentLanguage: es
  transitivelyLinkDependencies: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    DEVELOPMENT_TEAM: ""  # Completar con tu Team ID de Apple Developer
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: MetaCasa/Supporting/Info.plist
    CODE_SIGN_ENTITLEMENTS: MetaCasa/Supporting/MetaCasa.entitlements

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.24.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.14.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  MetaCasa:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MetaCasa
        excludes:
          - "**/*.md"
    resources:
      - path: MetaCasa/Supporting/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: KeychainAccess
        product: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metacasa.app
        PRODUCT_NAME: Home Finance
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
