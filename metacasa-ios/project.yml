name: MetaCasa
options:
  bundleIdPrefix: com.metacasa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"
  groupSortPosition: top
  developmentLanguage: es
  transitivelyLinkDependencies: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "3"
    MARKETING_VERSION: "1.0.0"
    DEVELOPMENT_TEAM: "K84H562MWX"  # Apple Developer Program — ARIEL JOSUE VEGA GUERRERO
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: MetaCasa/Supporting/Info.plist
    CODE_SIGN_ENTITLEMENTS: MetaCasa/Supporting/MetaCasa.entitlements

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.24.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.14.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX
    from: "0.14.2"
  # Sentry temporalmente deshabilitado: la descarga del XCFramework
  # binario de releases de GitHub falla en esta red. ObservabilityService
  # usa #if canImport(Sentry) → no-op sin el package. Re-activar cuando
  # la red permita bajar el artifact (descomentar + agregar la dependency
  # abajo + xcodegen generate).
  # Sentry:
  #   url: https://github.com/getsentry/sentry-cocoa
  #   from: "8.40.0"

targets:
  MetaCasa:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MetaCasa
        excludes:
          - "**/*.md"
        # Lista explícita de locales soportados en el String Catalog.
        # Xcode 15+ compila .xcstrings automáticamente si está en sources.
    resources:
      - path: MetaCasa/Supporting/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: KeychainAccess
        product: KeychainAccess
      - package: CoreXLSX
        product: CoreXLSX
      # - package: Sentry
      #   product: Sentry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metacasa.app
        PRODUCT_NAME: Home Finance
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_TESTABILITY: YES
    scheme:
      testTargets:
        - MetaCasaTests
      gatherCoverageData: true

  MetaCasaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MetaCasaTests
    dependencies:
      - target: MetaCasa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metacasa.app.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Home Finance.app/Home Finance"
